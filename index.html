<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>商品批量抠图工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f6;color:#222;min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:24px 16px 40px}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
.sub{font-size:14px;color:#888;margin-bottom:20px}
.panel{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:20px;margin-bottom:14px}
.ptitle{font-size:14px;font-weight:600;color:#444;margin-bottom:14px}
.status-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:4px}
.status-bar.ok{background:#e8f5e9;border:1px solid #a5d6a7;color:#1b5e20}
.status-bar.err{background:#fce4ec;border:1px solid #f48fb1;color:#880e4f}
.status-bar.checking{background:#fff8e1;border:1px solid #ffe082;color:#856404}
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
label{font-size:13px;color:#555;display:block;margin-bottom:6px}
input[type=number],input[type=text]{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
input[type=number]:focus{border-color:#6c5ce7}
.crow{display:flex;gap:8px;align-items:center}
input[type=color]{width:40px;height:36px;border:1px solid #ddd;border-radius:8px;cursor:pointer;padding:2px}
.crow input[type=text]{flex:1}
.qbtn{font-size:12px;padding:5px 12px;background:#f0f0f0;border:none;border-radius:6px;cursor:pointer}
.qbtn:hover{background:#e4e4e4}
.dz{border:2px dashed #ccc;border-radius:10px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#fafafa}
.dz:hover,.dz.over{border-color:#6c5ce7;background:#f3f0ff}
.dz input{display:none}
.btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.bp{background:#6c5ce7;color:#fff}.bp:hover{background:#5a4bd4}.bp:disabled{background:#bbb;cursor:not-allowed}
.bg2{background:#27ae60;color:#fff}.bg2:hover{background:#219a52}
.bd{background:#fff;color:#e74c3c;border:1px solid #e74c3c;font-size:13px;padding:6px 14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:4px}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden;position:relative}
.thumb{width:100%;aspect-ratio:1;object-fit:contain;display:block}
.cinfo{padding:8px 10px}
.cname{font-size:12px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cstatus{font-size:11px;margin-top:2px;font-weight:500}
.sp{color:#aaa}.sq{color:#e67e22}.sd{color:#27ae60}.se{color:#e74c3c}
.rmv{position:absolute;top:5px;right:5px;width:20px;height:20px;background:rgba(0,0,0,.45);border-radius:50%;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.pbar{height:6px;background:#eee;border-radius:3px;margin-top:14px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#6c5ce7,#a29bfe);transition:width .3s;border-radius:3px}
.ptxt{font-size:13px;color:#666;margin-top:6px}
.tabs{display:flex;gap:4px;margin-bottom:12px}
.tab{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid transparent;color:#666;background:none}
.tab.active{background:#6c5ce7;color:#fff}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #ddd;border-top:2px solid #6c5ce7;border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes sp{to{transform:rotate(360deg)}}
.ph{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;width:100%;aspect-ratio:1;background:#f9f9f9;font-size:24px}
.ph span{font-size:11px;color:#aaa;text-align:center;padding:0 8px;line-height:1.4}
.empty{text-align:center;padding:30px;color:#bbb;font-size:14px}
.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:16px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#ede9ff;color:#6c5ce7;margin-left:6px;vertical-align:middle}
.checker{background:repeating-conic-gradient(#ddd 0% 25%,#fff 0% 50%) 0 0/20px 20px !important}
</style>
</head>
<body>
<div class="app">
  <h1>🛒 商品批量抠图工具</h1>
  <p class="sub">阿里云视觉智能 · 电商商品像素级精准抠图 · 批量处理打包下载</p>

  <!-- 服务状态 -->
  <div class="panel">
    <div class="ptitle">⚙️ 服务状态</div>
    <div class="status-bar checking" id="statusBar">
      <span class="spin"></span> 正在检测阿里云服务连接…
    </div>
  </div>

  <!-- 上传 -->
  <div class="panel">
    <div class="ptitle">📁 上传商品图片</div>
    <div class="dz" id="dz">
      <input type="file" id="fi" multiple accept="image/*">
      <div style="font-size:36px;margin-bottom:10px">🖼️</div>
      <div style="font-size:15px;font-weight:500;color:#444">点击选择 或 拖拽图片到这里</div>
      <div style="font-size:13px;color:#aaa;margin-top:4px">支持 JPG、PNG、WEBP，可批量选择</div>
    </div>
  </div>

  <!-- 设置 -->
  <div class="panel">
    <div class="ptitle">🎨 背景与输出设置</div>
    <div class="sg">
      <div>
        <label>背景颜色</label>
        <div class="crow">
          <input type="color" id="bcp" value="#ffffff">
          <input type="text" id="bch" value="#ffffff" maxlength="7">
        </div>
      </div>
      <div><label>输出宽度 (px)</label><input type="number" id="ow" value="800" min="100" max="4000" step="10"></div>
      <div><label>输出高度 (px)</label><input type="number" id="oh" value="800" min="100" max="4000" step="10"></div>
    </div>
    <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
      <button class="qbtn" onclick="ss(800,800)">800×800</button>
      <button class="qbtn" onclick="ss(1000,1000)">1000×1000</button>
      <button class="qbtn" onclick="ss(1200,1200)">1200×1200</button>
      <button class="qbtn" onclick="ss(1200,628)">1200×628</button>
      <button class="qbtn" onclick="ss(750,750)">750×750</button>
    </div>
  </div>

  <!-- 队列 -->
  <div class="panel" id="qp" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div class="ptitle" style="margin:0">📋 图片队列 <span class="badge" id="qc">0 张</span></div>
      <button class="bd" onclick="clearAll()">清空全部</button>
    </div>
    <div class="tabs">
      <button class="tab active" id="t0" onclick="sw(0)">原图</button>
      <button class="tab" id="t1" onclick="sw(1)">抠图结果</button>
    </div>
    <div id="og" class="grid"></div>
    <div id="rg" class="grid" style="display:none"></div>
    <div id="pa" style="display:none;margin-top:4px">
      <div class="pbar"><div class="pfill" id="pf" style="width:0"></div></div>
      <div class="ptxt" id="pt"></div>
    </div>
    <div class="actions">
      <button class="btn bp" id="procBtn" onclick="procAll()">✨ 开始抠图</button>
      <button class="btn bg2" id="dlBtn" onclick="dlAll()" style="display:none">📦 打包下载 ZIP</button>
    </div>
  </div>

  <p style="font-size:12px;color:#ccc;text-align:center;margin-top:8px">阿里云视觉智能开放平台 · 电商商品专用抠图模型</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const items = [];
let ctab = 0;
let serviceReady = false;

// 检测服务状态
async function checkService() {
  try {
    const resp = await fetch('/api/account');
    const data = await resp.json();
    const bar = document.getElementById('statusBar');
    if (resp.ok && data.valid) {
      bar.className = 'status-bar ok';
      bar.innerHTML = `✅ 阿里云服务已就绪（${data.keyId}）· 可以开始上传图片抠图`;
      serviceReady = true;
    } else {
      bar.className = 'status-bar err';
      bar.innerHTML = `❌ 服务配置异常：${data.error || '请检查 Vercel 环境变量设置'}`;
    }
  } catch(e) {
    document.getElementById('statusBar').className = 'status-bar err';
    document.getElementById('statusBar').innerHTML = '❌ 无法连接服务，请刷新重试';
  }
}
checkService();

function readDU(file){return new Promise((r,j)=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.onerror=j;fr.readAsDataURL(file);});}
function loadImg(src){return new Promise((r,j)=>{const i=new Image();i.onload=()=>r(i);i.onerror=j;i.src=src;});}

document.getElementById('bcp').oninput=()=>document.getElementById('bch').value=document.getElementById('bcp').value;
document.getElementById('bch').oninput=()=>{if(/^#[0-9a-fA-F]{6}$/.test(document.getElementById('bch').value))document.getElementById('bcp').value=document.getElementById('bch').value;};
document.getElementById('dz').onclick=()=>document.getElementById('fi').click();
document.getElementById('fi').onchange=e=>addFiles(e.target.files);
document.getElementById('dz').ondragover=e=>{e.preventDefault();document.getElementById('dz').classList.add('over');};
document.getElementById('dz').ondragleave=()=>document.getElementById('dz').classList.remove('over');
document.getElementById('dz').ondrop=e=>{e.preventDefault();document.getElementById('dz').classList.remove('over');addFiles(e.dataTransfer.files);};
function ss(w,h){document.getElementById('ow').value=w;document.getElementById('oh').value=h;}

async function addFiles(files){
  const arr=Array.from(files).filter(f=>f.type.startsWith('image/'));
  if(!arr.length)return;
  for(const f of arr){const du=await readDU(f);items.push({file:f,name:f.name,du,rdu:null,blob:null,status:'pending',msg:''});}
  render();document.getElementById('fi').value='';
  document.getElementById('qp').style.display='block';
  document.getElementById('dlBtn').style.display='none';
}

function slbl(it){return it.msg||({pending:'等待处理',done:'✅ 完成',error:'❌ 失败'}[it.status]||it.status);}
function scls(s){return{pending:'sp',done:'sd',error:'se'}[s]||'sq';}

function render(){
  const bg=document.getElementById('bch').value||'#fff';
  document.getElementById('qc').textContent=items.length+' 张';
  ['og','rg'].forEach((id,t)=>{
    const el=document.getElementById(id);
    if(!items.length){el.innerHTML='<div class="empty">'+(t?'处理结果将显示在这里':'暂无图片')+'</div>';return;}
    el.innerHTML='';
    items.forEach((it,i)=>{
      const c=document.createElement('div');c.className='card';
      if(t===0){
        const img=document.createElement('img');img.className='thumb';img.style.background='#f0f0f0';img.src=it.du;
        const rmv=document.createElement('button');rmv.className='rmv';rmv.textContent='✕';rmv.onclick=()=>rm(i);
        const info=document.createElement('div');info.className='cinfo';
        info.innerHTML=`<div class="cname" title="${it.name}">${it.name}</div><div class="cstatus ${scls(it.status)}">${slbl(it)}</div>`;
        c.appendChild(img);c.appendChild(rmv);c.appendChild(info);
      }else{
        if(it.rdu){
          const img=document.createElement('img');img.className='thumb checker';img.style.background=bg;img.src=it.rdu;
          const info=document.createElement('div');info.className='cinfo';
          info.innerHTML=`<div class="cname" title="${it.name}">${it.name}</div><div class="cstatus sd">✅ 完成</div>`;
          c.appendChild(img);c.appendChild(info);
        }else{
          const active=it.status!=='pending'&&it.status!=='done'&&it.status!=='error';
          c.innerHTML=`<div class="ph">${active?'<span class="spin"></span>':it.status==='error'?'❌':'⏳'}<span>${slbl(it)}</span></div><div class="cinfo"><div class="cname">${it.name}</div><div class="cstatus ${scls(it.status)}">${slbl(it)}</div></div>`;
        }
      }
      el.appendChild(c);
    });
  });
}

function rm(i){items.splice(i,1);render();if(!items.length)document.getElementById('qp').style.display='none';}
function clearAll(){items.length=0;render();document.getElementById('qp').style.display='none';document.getElementById('dlBtn').style.display='none';}
function sw(t){ctab=t;document.getElementById('t0').className='tab'+(t===0?' active':'');document.getElementById('t1').className='tab'+(t===1?' active':'');document.getElementById('og').style.display=t===0?'grid':'none';document.getElementById('rg').style.display=t===1?'grid':'none';}

async function processOne(it){
  it.status='processing';it.msg='🤖 AI 识别中…';render();

  // 提取 base64 数据（去掉 data:image/xxx;base64, 前缀）
  const base64 = it.du.split(',')[1];

  const resp = await fetch('/api/remove', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ imageBase64: base64 })
  });

  if (!resp.ok) {
    const err = await resp.json().catch(()=>({}));
    throw new Error(err.error || `HTTP ${resp.status}`);
  }

  // 返回的是 PNG 图片二进制
  const pngBlob = await resp.blob();
  const pngDU = await new Promise((r,j)=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.onerror=j;fr.readAsDataURL(pngBlob);});

  it.msg='🖼️ 合成背景…';render();
  const oW=parseInt(document.getElementById('ow').value)||800;
  const oH=parseInt(document.getElementById('oh').value)||800;
  const bgColor=document.getElementById('bch').value||'#ffffff';
  const pad=0.07;
  const img=await loadImg(pngDU);
  const scale=Math.min((oW*(1-pad*2))/img.naturalWidth,(oH*(1-pad*2))/img.naturalHeight);
  const dW=Math.round(img.naturalWidth*scale),dH=Math.round(img.naturalHeight*scale);
  const out=document.createElement('canvas');out.width=oW;out.height=oH;
  const ctx=out.getContext('2d');
  ctx.fillStyle=bgColor;ctx.fillRect(0,0,oW,oH);
  ctx.drawImage(img,Math.round((oW-dW)/2),Math.round((oH-dH)/2),dW,dH);
  it.rdu=out.toDataURL('image/png');
  it.blob=await new Promise(r=>out.toBlob(r,'image/png',1));
  it.status='done';it.msg='';
}

async function procAll(){
  if(!serviceReady){alert('服务尚未就绪，请等待或刷新页面重试');return;}
  const pending=items.filter(it=>it.status!=='done');
  if(!pending.length){alert('所有图片已处理完成！');return;}
  const btn=document.getElementById('procBtn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> 处理中…';
  document.getElementById('pa').style.display='block';sw(1);
  let done=0;
  for(const it of pending){
    upd(done,items.length,'处理: '+it.name);
    try{await processOne(it);}
    catch(e){console.error(it.name,e);it.status='error';it.msg='❌ '+e.message.slice(0,50);}
    done++;render();
    upd(done,items.length,done<items.length?'继续处理…':'🎉 全部完成！');
  }
  btn.disabled=false;btn.innerHTML='✨ 重新处理';
  if(items.some(it=>it.status==='done'))document.getElementById('dlBtn').style.display='inline-block';
}

function upd(d,t,txt){document.getElementById('pf').style.width=Math.round(d/t*100)+'%';document.getElementById('pt').textContent=txt+' ('+d+'/'+t+')';}

async function dlAll(){
  const done=items.filter(it=>it.status==='done'&&it.blob);
  if(!done.length)return;
  const btn=document.getElementById('dlBtn');btn.disabled=true;btn.textContent='📦 打包中…';
  const zip=new JSZip();
  done.forEach(it=>zip.file(it.name.replace(/\.[^.]+$/,'')+'.png',it.blob));
  const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
  const fr=new FileReader();
  fr.onload=e=>{const a=document.createElement('a');a.href=e.target.result;a.download='商品抠图_'+new Date().toISOString().slice(0,10)+'.zip';document.body.appendChild(a);a.click();document.body.removeChild(a);btn.disabled=false;btn.textContent='📦 打包下载 ZIP';};
  fr.readAsDataURL(blob);
}
</script>
</body>
</html>
